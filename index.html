<script>
// ================= WORD LIST =================
const wordList = {
    "en-US": ["Apple", "Banana", "Orange", "Grape", "Lemon"],
    "ar-SA": ["تفاحة", "موز", "برتقال", "عنب", "ليمون"],
    "ur-PK": ["سیب", "کیلا", "سنگترہ", "انگور", "لیموں"]
};

let currentLanguage = "en-US";
let currentIndex = 0;
let currentWord = wordList[currentLanguage][currentIndex];

let correctWords = [];
let wrongWords = [];

function initWord(){
    currentWord = wordList[currentLanguage][currentIndex];
    document.getElementById("targetWord").innerText = currentWord;
    document.getElementById("spoken").innerText = "You said: ---";
    document.getElementById("result").innerText = "❓";
}
initWord();

function changeLanguage(){
    currentLanguage = document.getElementById("languageSelect").value;
    currentIndex = 0;
    correctWords = [];
    wrongWords = [];
    document.getElementById("nextPageBtn").style.display = "none";
    document.getElementById("retryBtn").style.display = "none";
    document.getElementById("restartBtn").style.display = "none";
    updateLists();
    initWord();
}

async function checkMicPermission() {
    try {
        const permission = await navigator.permissions.query({ name: 'microphone' });
        updatePermissionStatus(permission.state);
        permission.onchange = () => updatePermissionStatus(permission.state);
    } catch (error) {
        document.getElementById("micStatus").innerText =
            "⚠ Permission API not supported.";
    }
}

function updatePermissionStatus(state){
    if (state === "granted") {
        document.getElementById("micStatus").innerText = "🎤 Microphone: Allowed";
    } else if (state === "prompt") {
        document.getElementById("micStatus").innerText = "⚠ Click Record and allow microphone access";
    } else if (state === "denied") {
        document.getElementById("micStatus").innerText = "❌ Microphone blocked. Enable in browser settings.";
    }
}

checkMicPermission();

function startRecording(){
    const recordBtn = document.getElementById("recordBtn");
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = currentLanguage;
    recognition.continuous = false;
    recognition.interimResults = true;

    recordBtn.classList.add("recording");
    document.getElementById("status").innerText = "Status: 🎙 Listening... Speak now";
    document.getElementById("spoken").innerText = "You said: ";

    recognition.onresult = function(event){
        let spokenText = "";
        for (let i = 0; i < event.results.length; i++) {
            spokenText += event.results[i][0].transcript;
        }
        document.getElementById("spoken").innerText = "You said: " + spokenText;
    };

    recognition.onend = function(){
        recordBtn.classList.remove("recording");
        let spokenText = document.getElementById("spoken").innerText.replace("You said: ", "").trim();
        if(spokenText !== ""){
            let correct = checkAnswer(spokenText);
            if(correct){
                if(!correctWords.includes(currentWord)) correctWords.push(currentWord);
                wrongWords = wrongWords.filter(w => w !== currentWord);
            } else {
                if(!wrongWords.includes(currentWord)) wrongWords.push(currentWord);
            }
            updateLists();
            document.getElementById("retryBtn").style.display = wrongWords.length ? "inline-block" : "none";
            if(correct) nextWord();
            checkNextPageButton();
            checkRestartButton();
        }
        document.getElementById("status").innerText = "Status: Idle";
    };

    recognition.onerror = function(event){
        recordBtn.classList.remove("recording");
        document.getElementById("status").innerText =
            "Status: Error - " + event.error;
    };

    recognition.start();
    setTimeout(() => { recognition.stop(); }, 4000);
}

function cleanText(text){
    return text.toLowerCase().replace(/[^\p{L}\p{N}]/gu, "").trim();
}

function checkAnswer(spoken){
    let cleanSpoken = cleanText(spoken);
    let cleanCorrect = cleanText(currentWord);

    if(cleanSpoken === cleanCorrect){
        document.getElementById("result").innerText = "✅ Correct";
        return true;
    } else {
        document.getElementById("result").innerText = "❌ Wrong";
        return false;
    }
}

// ==================== FIXED playCorrect ====================
function playCorrect(){
    const utter = new SpeechSynthesisUtterance(currentWord);
    utter.lang = currentLanguage;

    // Select proper voice for Arabic/Urdu if available
    const voices = speechSynthesis.getVoices();
    if(currentLanguage === "ar-SA"){
        utter.voice = voices.find(v => v.lang.startsWith('ar')) || null;
    } else if(currentLanguage === "ur-PK"){
        utter.voice = voices.find(v => v.lang.startsWith('ur')) || null;
    }

    speechSynthesis.speak(utter);
}

// Ensure voices are loaded
speechSynthesis.onvoiceschanged = () => {};
// ============================================================

function nextWord(){
    currentIndex++;
    if(currentIndex >= wordList[currentLanguage].length){
        alert("🎉 You completed all words!");
        currentIndex = 0;
    }
    initWord();
}

function updateLists(){
    document.getElementById("correctList").innerText = correctWords.join(", ");
    document.getElementById("wrongList").innerText = wrongWords.join(", ");
}

function checkNextPageButton(){
    if(correctWords.length >= 4){
        document.getElementById("nextPageBtn").style.display = "inline-block";
    }
}

function checkRestartButton(){
    if(correctWords.length >= 4){
        document.getElementById("restartBtn").style.display = "inline-block";
    }
}

function goNextPage(){
    alert("🎯 Next Page Unlocked!");
}

function retryWrong(){
    if(wrongWords.length === 0){
        alert("No wrong words to retry!");
        return;
    }
    currentIndex = wordList[currentLanguage].indexOf(wrongWords[0]);
    initWord();
}

function restart(){
    location.reload();
}
</script>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Voice Practice System - Word Box</title>
<style>
/* Center stage and all content */
body { font-family: Arial; padding:20px; text-align:center; }
body {
    margin: 0;
    padding: 0;
}
html, body {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
/* ===== TOP BAR PROFESSIONAL STYLE ===== */
/* ===== TOP HEADER FULL WIDTH ===== */
#topHeader {
    width: 100vw;              /* full viewport width */
    height:200px;             /* adjust as needed */
    margin: 0;                 /* no margin */
    padding: 0;                /* no padding */
    background: url('your-image.jpg') no-repeat center center fixed;
    background-size: cover;     /* cover full area */
    position: relative;
    box-sizing: border-box;
}

/* Optional semi-transparent overlay for readability */
#topHeader::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.35);  /* adjust opacity */
    z-index: 0;
}

/* Content above overlay */
#topBar {
    position:top;
    z-index: 1;
    width: 100%;
    height: 100%;
    display: -moz-inline-box;
    flex-direction: column;
    justify-content: flex-start; /* stick content to top */
    align-items: flex-start;     /* align left */
    padding: 10px 20px 0 20px;  /* top + left/right padding */
    color: white;
}

/* Title and mic */
#topBar h2 {
    margin: 0;
    font-size: 28px;
}

#topBar #micStatus {
    margin: 5px 0 0 0;
    font-weight: bold;
    font-size: 16px;
    color: #ffeb3b;  /* yellow warning */
}

/* Language selector fixed top-left */
#languageSection {
    position: absolute;
    top: 15px;
    left: 15px;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 2;
}

#languageSelect {
    padding: 6px 12px;
    border-radius: 6px;
    border: none;
    background: #2d89ef;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

#languageSelect:hover {
    background: #1b5fad;
}
/* ===== TOP BAR MINIMAL ===== */
#topBar {
    width: 100%;
    margin: 0;
    padding: 5px 20px 5px 20px; /* very small padding top/bottom */
    position: relative;
}

/* Title */
#topBar h2 {
    margin: 0;
    font-size: 24px;
    text-align: center;   /* keep title centered */
}

/* Microphone status */
#micStatus {
    text-align: top;
    font-weight: 500;
    font-size: 12px;
    margin: 3px 0;        /* tiny margin */
    color: #ff4444;       /* red warning style */
}

/* Language selector top-left */
#languageSection {
    position: fixed;
    top: 5px;
    left: 15px;
    display: flex;
    align-items: center;
    gap: 45px;
}

/* Label & select professional */
#languageSection label {
    font-weight: bold;
    font-size: 14px;
}

#languageSelect {
    padding: 5px 10px;
    border-radius: 6px;
    border: none;
    background: #2d89ef;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

#languageSelect:hover {
    background: #1b5fad;
}
/* ===== TOP BAR ===== */
#topBar {
    width: 45%;
    max-width: 1000px;
    margin: auto;
    padding: -5px 0;
    position: top;
}

/* Title Centered */
#topBar h2 {
    margin: 10px 0 5px 0;
    font-size: 28px;
    text-align: center;
}

/* Microphone Status */
#micStatus {
    text-align: top;
    font-weight: 300;
    margin-bottom: -50px;
}
/* ===== SCROLLING TEXT ===== */
#scrollText {
    width: 100%;
    overflow: hidden;
    white-space: nowrap;
    box-sizing: border-box;
    margin: 15px 0;
    font-weight: bold;
    color: #2d89ef;
    animation: scrollLeft 12s linear infinite;
}
/* ===== SCROLL WRAPPER WITH FADE ===== */
#scrollWrapper {
    position: relative;
    width: 100%;
    overflow: hidden;
    margin: 15px 0;
}

/* Fade effect left & right */
#scrollWrapper::before,
#scrollWrapper::after {
    content: "";
    position: absolute;
    top: 0;
    width: 80px;
    height: 100%;
    z-index: 2;
    pointer-events: none;
}

#scrollWrapper::before {
    left: 0;
    background: linear-gradient(to right, white, transparent);
}

#scrollWrapper::after {
    right: 0;
    background: linear-gradient(to left, white, transparent);
}

/* Moving Text */
#scrollText {
    display: inline-block;
    white-space: nowrap;
    font-weight: bold;
    color: #2d89ef;
    animation: scrollLeft 30s linear infinite;
}

/* Animation */
@keyframes scrollLeft {
    0% { transform: translateX(100%); }
    100% { transform: translateX(-100%); }
}

/* Animation */
@keyframes scrollLeft {
    0% { transform: translateX(100%); }
    100% { transform: translateX(-100%); }
}

/* ===== LANGUAGE TOP LEFT ===== */
#languageSection {
    position: fixed;
    top: 10px;
    left: 15px;
    display: flex;
    align-items: center;
    gap: 8px;
}

/* Add more space above title */
#topBar h2 {
    margin-top: 70px;  /* increase this for more space */
}

/* Label style */
#languageSection label {
    font-weight: bold;
}

/* Colored Professional Dropdown */
#languageSelect {
    padding: 6px 12px;
    border-radius: 6px;
    border: none;
    background: #44f61c;     
    color: white;
    font-weight: bold;
    cursor: pointer;
}

/* Dropdown hover */
#languageSelect:hover {
    background: #c5dc2b;
}
/* Word box styling */
#wordBox {
    font-size: 80px;          /* make the word bigger */
    font-weight: bold;
    display: inline-block;
    margin: 100px 0;           /* more space above and below */
    line-height: 0.5;  
           /* vertical spacing inside */
}
#targetWord {
    display: inline-block;
    animation: float 2.5s ease-in-out infinite;
    text-shadow:
        2px 2px 4px rgba(0,0,0,0.3),
        0px 18px 12px rgba(0,0,0,0.25);
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0px); }
}
#wordBox span.dashes {
    font-weight: normal;      /* makes the dashes thinner */
    color: #555;              /* optional: lighter color */
    letter-spacing: 1px;
    margin: 2px 0;        /* optional: space between dashes */
}
#wordBox span.brackets {
    font-weight: 100;       /* very thin */
    font-size: 48px;        /* same size as word for alignment */
    color: #333;            /* optional: slightly lighter than black */
    margin: 0 2px;         /* spacing between brackets and word */
}
#wordArea{
display:flex;
align-items:center;
justify-content:center;
gap:1px;
margin-top: -80px;
}

#leftImage {
    width:400px;
    height:400px;
    display: none;
    position: top;        /* important for pseudo-element */
    animation: float 2.5s ease-in-out infinite;
    background: transparent;   /* no background */
    padding: 0;
    border: none;
}

#leftImage::after {
    content: "";
    position: absolute;
    bottom: -15px;            /* shadow below image */
    left: 50%;
    transform: translateX(-50%);
    width: 120px;             /* shadow width */
    height: 25px;             /* shadow height */
    background: rgba(0,0,0,0.35); /* darker so visible */
    border-radius: 50%;       /* oval shadow */
    filter: blur(10px);       /* soft shadow */
    z-index: -1;              /* behind image */
    animation: shadowFloat 2.5s ease-in-out infinite; /* move shadow slightly */
}

/* float animation for image */
@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0px); }
}

/* shadow movement: scale slightly to simulate drag */
@keyframes shadowFloat {
    0% { transform: translateX(-50%) scaleX(1); opacity: 0.60; }
    50% { transform: translateX(-50%) scaleX(1.1); opacity: 0.10; }
    100% { transform: translateX(-50%) scaleX(1); opacity: 0.60; }
}

#wordImage {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
}
#playcorrect {           /* make sure this matches your button's id exactly */
    padding: 8px 14px;
    border-radius: 12px;        /* rounded */
    border: none;               /* remove border */
    outline: none;              /* remove focus outline */
    background-color: #8ecae6;  /* soft color */
    color: white;
    font-size: 20px;            /* icon bigger */
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 6px rgba(0,0,0,0.15);
}

#playcorrect:hover {
    background-color: #219ebc;  /* slightly darker on hover */
    transform: translateY(-2px);
}
/* Buttons styling */
button { padding:10px 18px; font-size:16px; margin:8px; }

/* Correct/Wrong lists centered */
#lists { display: inline-block; text-align:left; margin-top:20px; }

/* Other elements styling */
#status { font-weight:bold; margin-top:10px; }
#spoken { font-size:18px; margin-top:10px; color:blue; }
#result { font-size:40px; margin-top:10px; }
#micStatus { margin-bottom:15px; font-weight:bold; }
select { padding:5px; font-size:16px; }
.recording { background:red; color:white; }
#nextPageBtn, #retryBtn, #restartBtn { display:none; background:green; color:white; }
</style>
</head>
<body>

<div id="topHeader">
    <div id="topBar">
        <h2>📘 Learning Alphabet System</h2>
        <p id="micStatus">⚠ Click Record and allow microphone access</p>

        <div id="languageSection">
            <label>Select Language:</label>
            <select id="languageSelect" onchange="changeLanguage()">
                <option value="en-US">English</option>
                <option value="ar-SA">Arabic</option>
                <option value="ur-PK">Urdu</option>
            </select>
        </div>
    </div>
</div>




<div id="scrollWrapper">
    <div id="scrollText">
        🌟 Welcome to Learning Alphabet System – Practice Daily – Improve Pronunciation – 🌟
    </div>
</div>


<hr>

<!-- Word box with dashes -->
<p><strong></strong> 
    <span id="wordBox">
        <span class="dashes"></span> 
        <span class="brackets"></span> 
        <span id="targetWord"></span> 
        <span class="brackets"></span> 
        <span class="dashes"></span>
    </span>
</p>
<p>

<div id="wordArea">
    <span id="wordBox">
        <span id="targetWord"></span> 
    </span>
    <div id="leftImage">
        <img id="wordImage" src="" alt="Word Image">
    </div>
</div>

</p>
<button id="recordBtn" onclick="startRecording()">🎙 Record</button>
<button id="playcorrect" onclick="playcorrect()">🔊</button>
<button id="nextBtn" onclick="nextWord()">➡ Next Word</button>
<button id="nextPageBtn" onclick="goNextPage()">🎯 Next Page</button>
<button id="retryBtn" onclick="retryWrong()">🔄 Try Again</button>
<button id="restartBtn" onclick="restart()">🔁 Restart</button>

<p id="status">Status: Idle</p>
<p id="spoken">You said: ---</p>
<p id="result">❓</p>

<div id="lists">
    <div><strong>✅ Correct Words:</strong> <span id="correctList"></span></div>
    <div><strong>❌ Wrong Words:</strong> <span id="wrongList"></span></div>
</div>

<script>
// ================= WORD LIST =================
const wordList = {
    "en-US": ["Apple", "Banana", "Orange", "Grape", "Lemon"],
    "ar-SA": ["تفاحة", "موز", "برتقال", "عنب", "ليمون"],
    "ur-PK": ["سیب", "کیلا", "سنگترہ", "انگور", "لیموں"]
};

let currentLanguage = "en-US";
let currentIndex = 0;
let currentWord = wordList[currentLanguage][currentIndex];

let correctWords = [];
let wrongWords = [];
// ================= WORD IMAGES =================
const wordImages = {
    "en-US": {
        "Apple": "images/apple.png",
        "Banana": "images/banana.png",
        "Orange": "images/orange.png",
        "Grape": "images/grape.png",
        "Lemon": "images/lemon.png"
    },
    "ar-SA": {
        "تفاحة": "images/apple.png",
        "موز": "images/banana.png",
        "برتقال": "images/orange.png",
        "عنب": "images/grape.png",
        "ليمون": "images/lemon.png"
    },
    "ur-PK": {
        "سیب": "images/apple.png",
        "کیلا": "images/banana.png",
        "سنگترہ": "images/orange.png",
        "انگور": "images/grape.png",
        "لیموں": "images/lemon.png"
    }
};
function initWord(){

    currentWord = wordList[currentLanguage][currentIndex];

    document.getElementById("targetWord").innerText = currentWord;
    document.getElementById("spoken").innerText = "You said: ---";
    document.getElementById("result").innerText = "❓";

    const imgContainer = document.getElementById("leftImage");
    const img = document.getElementById("wordImage");

    if(wordImages[currentLanguage] && wordImages[currentLanguage][currentWord]){
        img.src = wordImages[currentLanguage][currentWord];
        imgContainer.style.display = "block";
    } else {
        imgContainer.style.display = "none";
    }
}
initWord();

function changeLanguage(){
    currentLanguage = document.getElementById("languageSelect").value;
    currentIndex = 0;
    correctWords = [];
    wrongWords = [];
    document.getElementById("nextPageBtn").style.display = "none";
    document.getElementById("retryBtn").style.display = "none";
    document.getElementById("restartBtn").style.display = "none";
    updateLists();
    initWord();
}

async function checkMicPermission() {
    try {
        const permission = await navigator.permissions.query({ name: 'microphone' });
        updatePermissionStatus(permission.state);
        permission.onchange = () => updatePermissionStatus(permission.state);
    } catch (error) {
        document.getElementById("micStatus").innerText =
            "⚠ Permission API not supported.";
    }
}

function updatePermissionStatus(state){
    if (state === "granted") {
        document.getElementById("micStatus").innerText = "🎤 Microphone: Allowed";
    } else if (state === "prompt") {
        document.getElementById("micStatus").innerText = "⚠ Click Record and allow microphone access";
    } else if (state === "denied") {
        document.getElementById("micStatus").innerText = "❌ Microphone blocked. Enable in browser settings.";
    }
}

checkMicPermission();

function startRecording(){
    const recordBtn = document.getElementById("recordBtn");
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = currentLanguage;
    recognition.continuous = false;
    recognition.interimResults = true;

    recordBtn.classList.add("recording");
    document.getElementById("status").innerText = "Status: 🎙 Listening... Speak now";
    document.getElementById("spoken").innerText = "You said: ";

    recognition.onresult = function(event){
        let spokenText = "";
        for (let i = 0; i < event.results.length; i++) {
            spokenText += event.results[i][0].transcript;
        }
        document.getElementById("spoken").innerText = "You said: " + spokenText;
    };

    recognition.onend = function(){
        recordBtn.classList.remove("recording");
        let spokenText = document.getElementById("spoken").innerText.replace("You said: ", "").trim();
        if(spokenText !== ""){
            let correct = checkAnswer(spokenText);
            if(correct){
                if(!correctWords.includes(currentWord)) correctWords.push(currentWord);
                wrongWords = wrongWords.filter(w => w !== currentWord);
            } else {
                if(!wrongWords.includes(currentWord)) wrongWords.push(currentWord);
            }
            updateLists();
            document.getElementById("retryBtn").style.display = wrongWords.length ? "inline-block" : "none";
            if(correct) nextWord();
            checkNextPageButton();
            checkRestartButton();
        }
        document.getElementById("status").innerText = "Status: Idle";
    };

    recognition.onerror = function(event){
        recordBtn.classList.remove("recording");
        document.getElementById("status").innerText =
            "Status: Error - " + event.error;
    };

    recognition.start();
    setTimeout(() => { recognition.stop(); }, 4000);
}

function cleanText(text){
    return text.toLowerCase().replace(/[^\p{L}\p{N}]/gu, "").trim();
}

function checkAnswer(spoken){
    let cleanSpoken = cleanText(spoken);
    let cleanCorrect = cleanText(currentWord);

    if(cleanSpoken === cleanCorrect){
        document.getElementById("result").innerText = "✅ Correct";
        return true;
    } else {
        document.getElementById("result").innerText = "❌ Wrong";
        return false;
    }
}

function playCorrect(){
    const utter = new SpeechSynthesisUtterance(currentWord);
    utter.lang = currentLanguage;

    // Select proper voice for Arabic/Urdu if available
    const voices = speechSynthesis.getVoices();
    if(currentLanguage === "ar-SA"){
        utter.voice = voices.find(v => v.lang.startsWith('ar')) || null;
    } else if(currentLanguage === "ur-PK"){
        utter.voice = voices.find(v => v.lang.startsWith('ur')) || null;
    }

    speechSynthesis.speak(utter);
}

// Ensure voices are loaded properly
speechSynthesis.onvoiceschanged = () => {};

function nextWord(){
    currentIndex++;
    if(currentIndex >= wordList[currentLanguage].length){
        alert("🎉 You completed all words!");
        currentIndex = 0;
    }
    initWord();
}

function updateLists(){
    document.getElementById("correctList").innerText = correctWords.join(", ");
    document.getElementById("wrongList").innerText = wrongWords.join(", ");
}

function checkNextPageButton(){
    if(correctWords.length >= 4){
        document.getElementById("nextPageBtn").style.display = "inline-block";
    }
}

function checkRestartButton(){
    if(correctWords.length >= 4){
        document.getElementById("restartBtn").style.display = "inline-block";
    }
}

function goNextPage(){
    alert("🎯 Next Page Unlocked!");
}

function retryWrong(){
    if(wrongWords.length === 0){
        alert("No wrong words to retry!");
        return;
    }
    currentIndex = wordList[currentLanguage].indexOf(wrongWords[0]);
    initWord();
}

function restart(){
    location.reload();
}

</script>
</body>
</html>a
